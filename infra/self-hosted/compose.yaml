name: jupiter

x-webapi-cron-env: &webapi-cron-env
  SQLITE_DB_URL: ${SQLITE_DB_URL:-sqlite+aiosqlite:////data/jupiter.sqlite}
  POSTGRES_DB_URL: ${POSTGRES_DB_URL:-}
  ALEMBIC_INI_PATH: ${ALEMBIC_INI_PATH:-../../core/migrations/alembic.sqlite.ini}
  ALEMBIC_MIGRATIONS_PATH: ${ALEMBIC_MIGRATIONS_PATH:-../../core/migrations/sqlite}
  UNIVERSE: ${UNIVERSE:?Check https://docs.get-thriving.com/how-tos/self-hosting}
  ENV: ${ENV:-production}
  INSTANCE: ${INSTANCE:?Check https://docs.get-thriving.com/how-tos/self-hosting}
  AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:?Check https://docs.get-thriving.com/how-tos/self-hosting}
  AUTH_PROVIDER: ${AUTH_PROVIDER:-local}
  WEBAPI_STORAGE_ENGINE: ${WEBAPI_STORAGE_ENGINE:-sqlite}
  TELEMETRY: ${TELEMETRY:-local}
  WEBAPI_SEARCH: ${WEBAPI_SEARCH:-sql}
  CRM: ${CRM:-noop}
  POSTGRES_VERSION: ${POSTGRES_VERSION:-18}
  WEBAPI_CRON_EXECUTION_MODE: "run-forever"

x-webapi-cron-service: &webapi-cron-service
  restart: always
  volumes:
    - sqlite_data:/data
  depends_on:
    webapi-postgres:
      condition: service_healthy
      required: false
    webapi:
      condition: service_healthy

services:
  webapi-postgres:
    profiles:
      - storage-engine-postgres
    image: postgres:${POSTGRES_VERSION:-18}
    restart: always
    environment:
      POSTGRES_USER: ${DEV_POSTGRES_USER:-jupiter}
      POSTGRES_PASSWORD: ${DEV_POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${DEV_POSTGRES_DB:-jupiter}
    volumes:
      # Postgres 18+ images expect one mount at /var/lib/postgresql (not .../data); see docker-library/postgres#1259.
      - postgres_data:/var/lib/postgresql
    healthcheck:
      # Must match POSTGRES_USER / POSTGRES_DB (from DEV_POSTGRES_*), not hardcoded jupiter.
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      # Host port for psql / GUI tools (Compose v2.20+): see WEBAPI_POSTGRES_PORT from srv.sh / mise run run:srv.
      # Use a non-zero value for a stable mapping; :0 assigns an ephemeral host port.
      - "${WEBAPI_POSTGRES_PORT:-0}:5432"
  webapi:
    environment:
      - SQLITE_DB_URL=${SQLITE_DB_URL:-sqlite+aiosqlite:////data/jupiter.sqlite}
      - POSTGRES_DB_URL=${POSTGRES_DB_URL:-}
      - ALEMBIC_INI_PATH=${ALEMBIC_INI_PATH:-../../core/migrations/alembic.sqlite.ini}
      - ALEMBIC_MIGRATIONS_PATH=${ALEMBIC_MIGRATIONS_PATH:-../../core/migrations/sqlite}
      - UNIVERSE=${UNIVERSE:?Check https://docs.get-thriving.com/how-tos/self-hosting}
      - ENV=${ENV:-production}
      - INSTANCE=${INSTANCE:?Check https://docs.get-thriving.com/how-tos/self-hosting}
      - PORT=2000
      - AUTH_TOKEN_SECRET=${AUTH_TOKEN_SECRET:?Check https://docs.get-thriving.com/how-tos/self-hosting}
      - AUTH_PROVIDER=${AUTH_PROVIDER:-local}
      - WEBAPI_STORAGE_ENGINE=${WEBAPI_STORAGE_ENGINE:-sqlite}
      - TELEMETRY=${TELEMETRY:-local}
      - WEBAPI_SEARCH=${WEBAPI_SEARCH:-sql}
      - CRM=${CRM:-noop}
      - POSTGRES_VERSION=${POSTGRES_VERSION:-18}
    depends_on:
      webapi-postgres:
        condition: service_healthy
        required: false
    restart: always
    image: ${DOCKER_IMAGE_WEBAPI:-getthriving/webapi-srv:${VERSION:-latest}}
    ports:
    - "${WEBAPI_PORT:-0}:2000"
    volumes:
      - sqlite_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
  webapi-gc-do-all:
    <<: *webapi-cron-service
    image: ${DOCKER_IMAGE_WEBAPI_GC_DO_ALL:-getthriving/webapi-gc-do-all:${VERSION:-latest}}
    environment:
      <<: *webapi-cron-env
  webapi-clear-abandoned-users-do-all:
    <<: *webapi-cron-service
    image: ${DOCKER_IMAGE_WEBAPI_CLEAR_ABANDONED_USERS_DO_ALL:-getthriving/webapi-clear-abandoned-users-do-all:${VERSION:-latest}}
    environment:
      <<: *webapi-cron-env
  webapi-sync-google-user-data-do-all:
    <<: *webapi-cron-service
    image: ${DOCKER_IMAGE_WEBAPI_SYNC_GOOGLE_USER_DATA_DO_ALL:-getthriving/webapi-sync-google-user-data-do-all:${VERSION:-latest}}
    environment:
      <<: *webapi-cron-env
  webapi-gen-do-all:
    <<: *webapi-cron-service
    image: ${DOCKER_IMAGE_WEBAPI_GEN_DO_ALL:-getthriving/webapi-gen-do-all:${VERSION:-latest}}
    environment:
      <<: *webapi-cron-env
  webapi-schedule-external-sync-do-all:
    <<: *webapi-cron-service
    image: ${DOCKER_IMAGE_WEBAPI_SCHEDULE_EXTERNAL_SYNC_DO_ALL:-getthriving/webapi-schedule-external-sync-do-all:${VERSION:-latest}}
    environment:
      <<: *webapi-cron-env
  webapi-search-index-backfill-do-all:
    <<: *webapi-cron-service
    image: ${DOCKER_IMAGE_WEBAPI_SEARCH_INDEX_BACKFILL_DO_ALL:-getthriving/webapi-search-index-backfill-do-all:${VERSION:-latest}}
    environment:
      <<: *webapi-cron-env
  webapi-search-mutation-log-drain-do-all:
    <<: *webapi-cron-service
    image: ${DOCKER_IMAGE_WEBAPI_SEARCH_MUTATION_LOG_DRAIN_DO_ALL:-getthriving/webapi-search-mutation-log-drain-do-all:${VERSION:-latest}}
    environment:
      <<: *webapi-cron-env
  webapi-search-mutation-requeue-do-all:
    <<: *webapi-cron-service
    image: ${DOCKER_IMAGE_WEBAPI_SEARCH_MUTATION_REQUEUE_DO_ALL:-getthriving/webapi-search-mutation-requeue-do-all:${VERSION:-latest}}
    environment:
      <<: *webapi-cron-env
  webapi-stats-do-all:
    <<: *webapi-cron-service
    image: ${DOCKER_IMAGE_WEBAPI_STATS_DO_ALL:-getthriving/webapi-stats-do-all:${VERSION:-latest}}
    environment:
      <<: *webapi-cron-env
  api:
    environment:
      - UNIVERSE=${UNIVERSE:?Check https://docs.get-thriving.com/how-tos/self-hosting}
      - ENV=${ENV:-production}
      - INSTANCE=${INSTANCE:?Check https://docs.get-thriving.com/how-tos/self-hosting}
      - PORT=10020
      - WEBAPI_SERVER_HOST=webapi
      - WEBAPI_SERVER_PORT=2000
      - MOUNT_PATH=/api
    restart: always
    image: ${DOCKER_IMAGE_API:-getthriving/api:${VERSION:-latest}}
    ports:
      - "${API_PORT:-0}:10020"
    depends_on:
      - webapi
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10020/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
  mcp:
    environment:
      - UNIVERSE=${UNIVERSE:?Check https://docs.get-thriving.com/how-tos/self-hosting}
      - ENV=${ENV:-production}
      - INSTANCE=${INSTANCE:?Check https://docs.get-thriving.com/how-tos/self-hosting}
      - PORT=10030
      - WEBAPI_SERVER_HOST=webapi
      - WEBAPI_SERVER_PORT=2000
    restart: always
    image: ${DOCKER_IMAGE_MCP:-getthriving/mcp:${VERSION:-latest}}
    ports:
      - "${MCP_PORT:-0}:10030"
    depends_on:
      - webapi
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10030/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
  webui:
    environment:
      - UNIVERSE=${UNIVERSE:?Check https://docs.get-thriving.com/how-tos/self-hosting}
      - ENV=${ENV:-production}
      - INSTANCE=${INSTANCE:?Check https://docs.get-thriving.com/how-tos/self-hosting}
      - AUTH_PROVIDER=${AUTH_PROVIDER:-local}
      - TELEMETRY=${TELEMETRY:-local}
      - CRM=${CRM:-noop}
      - PORT=2000
      - WEBAPI_SERVER_HOST=webapi
      - WEBAPI_SERVER_PORT=2000
      - WEBAPI_PROGRESS_REPORTER_URL=ws://webapi:2000/progress-reporter
      - WEBAPI_URL=${WEBAPI_SERVER_URL:-http://webapi:2000}
      - API_URL=${API_SERVER_URL:-${PROTOCOL:-https}://${DOMAIN:?Check https://docs.get-thriving.com/how-tos/self-hosting}}/api
      - MCP_URL=${MCP_SERVER_URL:-${PROTOCOL:-https}://${DOMAIN:?Check https://docs.get-thriving.com/how-tos/self-hosting}}/mcp
      - WEBUI_URL=${WEBUI_SERVER_URL:-${PROTOCOL:-https}://${DOMAIN:?Check https://docs.get-thriving.com/how-tos/self-hosting}}
      - DOCS_URL=${PROTOCOL:-https}://${DOMAIN:?Check https://docs.get-thriving.com/how-tos/self-hosting}/docs/
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - SESSION_COOKIE_SECRET=${SESSION_COOKIE_SECRET:?Check https://docs.get-thriving.com/how-tos/self-hosting}
    restart: always
    image: ${DOCKER_IMAGE_WEBUI:-getthriving/webui:${VERSION:-latest}}
    depends_on:
      - webapi
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
  docs:
    environment:
      - UNIVERSE=${UNIVERSE:?Check https://docs.get-thriving.com/how-tos/self-hosting}
      - ENV=${ENV:-production}
      - INSTANCE=${INSTANCE:?Check https://docs.get-thriving.com/how-tos/self-hosting}
      - DEV_ADDR=0.0.0.0:8000
      - SITE_URL=${PROTOCOL:-https}://${DOMAIN:?Check https://docs.get-thriving.com/how-tos/self-hosting}/docs/
      - API_URL=${API_SERVER_URL:-${PROTOCOL:-https}://${DOMAIN:?Check https://docs.get-thriving.com/how-tos/self-hosting}}/api
      - PUBLIC_NAME=${PUBLIC_NAME}
    restart: always
    image: ${DOCKER_IMAGE_DOCS:-getthriving/docs:${VERSION:-latest}}
    ports:
      - "${DOCS_PORT:-0}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
  frontend:
    image: nginx:1-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "${WEBUI_PORT:-0}:443"
    depends_on:
      - webui
      - api
      - mcp
      - webapi
      - docs
    volumes:
      - ${FULLCHAIN_PEM:-/etc/letsencrypt/live/${DOMAIN:-none}/fullchain.pem}:/etc/letsencrypt/live/domain/fullchain.pem
      - ${PRIVKEY_PEM:-/etc/letsencrypt/live/${DOMAIN:-none}/privkey.pem}:/etc/letsencrypt/live/domain/privkey.pem
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./webui.conf:/etc/nginx/conf.d/webui.conf
      - ./webui.nodomain.conf:/etc/nginx/conf.d/webui.nodomain.conf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
volumes:
  sqlite_data:
    name: sqlite_data-${INSTANCE:-dev}
  postgres_data:
    name: postgres_data-${INSTANCE:-dev}
    