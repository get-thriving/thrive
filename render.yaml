previews:
  generation: automatic
  expireAfterDays: 1

services:
- type: web
  name: jupiter-webui
  runtime: docker
  dockerfilePath: ./src/webui/Dockerfile
  dockerContext: .
  region: frankfurt
  plan: starter
  autoDeploy: true
  rootDir: .
  numInstances: 1
  healthCheckPath: /healthz
  domains:
    - app.get-thriving.com
  previews:
    generation: automatic
    plan: starter
  envVars:
    - key: UNIVERSE
      value: thrive
    - key: ENV
      value: production
      previewValue: staging
    - key: INSTANCE
      value: Main
      previewValue: TO-FILL
    - key: WEBAPI_SERVER_HOST
      fromService:
        name: jupiter-webapi
        type: web
        property: host
    - key: WEBAPI_SERVER_PORT
      fromService:
        name: jupiter-webapi
        type: web
        property: port
    - key: WEBAPI_URL
      fromService:
        name: jupiter-webapi
        type: web
        envVarKey: RENDER_EXTERNAL_URL
    - key: DOCS_URL
      fromService:
        name: jupiter-docs
        type: web
        envVarKey: RENDER_EXTERNAL_URL
    - key: SESSION_COOKIE_SECURE
      value: true
- type: web
  name: jupiter-webapi
  runtime: docker
  dockerfilePath: ./src/webapi/Dockerfile
  dockerContext: .
  region: frankfurt
  plan: starter
  autoDeploy: true
  rootDir: .
  numInstances: 1
  healthCheckPath: /healthz
  domains:
    - api.infra.get-thriving.com
  previews:
    generation: automatic
    plan: starter
  disk:
      name: jupiter-data
      mountPath: /data
      sizeGB: 5
  envVars:
    - key: UNIVERSE
      value: thrive
    - key: ENV
      value: production
      previewValue: staging
    - key: INSTANCE
      value: Main
      previewValue: TO-FILL
    - key: SQLITE_DB_URL
      value: sqlite+aiosqlite:////data/jupiter.sqlite
    - key: ALEMBIC_INI_PATH
      value: /jupiter/src/core/migrations/alembic.ini
    - key: ALEMBIC_MIGRATIONS_PATH
      value: /jupiter/src/core/migrations
- type: web
  name: jupiter-docs
  runtime: static
  buildCommand: ./tasks/build/docs.sh
  staticPublishPath: .build-cache/docs
  domains:
    - docs.get-thriving.com
  previews:
    generation: automatic
  envVars:
    - key: UNIVERSE
      value: thrive
    - key: ENV
      value: production
      previewValue: staging
    - key: INSTANCE
      value: Main
      previewValue: TO-FILL
    - key: UV_VERSION
      value: 0.9.11
    - key: PYTHON_VERSION
      value: 3.13.0
