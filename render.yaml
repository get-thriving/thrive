previews:
  generation: automatic
  expireAfterDays: 1

# WebAPI shared env (see also per-service overrides, e.g. SQLITE on webapi-srv uses /data).
envVarGroups:
  - name: jupiter-webapi-config
    envVars:
      - key: UNIVERSE
        value: thrive
      - key: ENV
        value: production
        previewValue: staging
      - key: INSTANCE
        value: Main
        previewValue: TO-FILL
      - key: SQLITE_DB_URL
        value: sqlite+aiosqlite:////tmp/jupiter.sqlite
      - key: ALEMBIC_INI_PATH
        value: /jupiter/src/core/migrations/alembic.postgres.ini
      - key: ALEMBIC_MIGRATIONS_PATH
        value: /jupiter/src/core/migrations/postgres
      - key: AUTH_PROVIDER
        value: local-google-apple
      - key: TELEMETRY
        value: sentry
        previewValue: sentry
      - key: CRM
        value: wix
        previewValue: noop
      - key: WEBAPI_STORAGE_ENGINE
        value: postgres
      - key: WEBAPI_SEARCH
        value: algolia
  - name: jupiter-webapi-secrets
    envVars:
      - key: ALGOLIA_APP_ID
        sync: false
      - key: ALGOLIA_WRITE_API_KEY
        sync: false
      - key: AUTH_TOKEN_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: WIX_ACCOUNT_ID
        sync: false
      - key: WIX_API_KEY
        sync: false
      - key: WIX_SITE_ID
        sync: false

# Repo-root-relative globs for auto-deploy builds. See https://render.com/docs/monorepo-support
x-webapi-build-filter: &webapi-build-filter
  buildFilter:
    paths:
      - src/webapi/**
      - src/core/**
      - src/alib/py/framework/**
      - pyproject.toml
      - uv.lock
      - src/Config.global
x-webui-build-filter: &webui-build-filter
  buildFilter:
    paths:
      - src/webui/**
      - src/core/jupiter/core/**
      - gen/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - assets/**
x-api-build-filter: &api-build-filter
  buildFilter:
    paths:
      - src/api/**
      - src/core/**
      - src/alib/py/framework/**
      - gen/py/webapi-client/**
      - pyproject.toml
      - uv.lock
      - src/Config.global
x-mcp-build-filter: &mcp-build-filter
  buildFilter:
    paths:
      - src/mcp/**
      - src/core/**
      - src/alib/py/framework/**
      - gen/py/webapi-client/**
      - pyproject.toml
      - uv.lock
      - src/Config.global
x-docs-build-filter: &docs-build-filter
  buildFilter:
    paths:
      - src/docs/**
      - tasks/build/docs.sh
      - src/Config.global

services:
- type: web
  name: jupiter-webui
  <<: *webui-build-filter
  runtime: docker
  dockerfilePath: ./src/webui/Dockerfile
  dockerContext: .
  region: frankfurt
  plan: starter
  autoDeploy: true
  rootDir: .
  numInstances: 1
  healthCheckPath: /healthz
  domains:
    - app.get-thriving.com
  previews:
    generation: automatic
    plan: starter
  envVars:
    - key: UNIVERSE
      value: thrive
    - key: ENV
      value: production
      previewValue: staging
    - key: INSTANCE
      value: Main
      previewValue: TO-FILL
    - key: WEBAPI_SERVER_HOST
      fromService:
        name: jupiter-webapi-srv
        type: web
        property: host
    - key: WEBAPI_SERVER_PORT
      fromService:
        name: jupiter-webapi-srv
        type: web
        property: port
    - key: WEBAPI_URL
      fromService:
        name: jupiter-webapi-srv
        type: web
        envVarKey: RENDER_EXTERNAL_URL
    - key: WEBUI_URL
      value: https://app.get-thriving.com
    - key: API_URL
      value: https://api.get-thriving.com
    - key: MCP_URL
      value: https://mcp.get-thriving.com
    - key: DOCS_URL
      value: https://docs.get-thriving.com
    - key: SESSION_COOKIE_SECURE
      value: true
    - key: AUTH_PROVIDER
      value: local-google-apple
- type: web
  name: jupiter-webapi-srv
  <<: *webapi-build-filter
  runtime: docker
  dockerfilePath: ./src/webapi/srv/Dockerfile
  dockerContext: .
  region: frankfurt
  plan: starter
  autoDeploy: true
  rootDir: .
  numInstances: 1
  healthCheckPath: /healthz
  domains:
    - webapi.infra.get-thriving.com
  previews:
    generation: automatic
    plan: starter
  envVars:
    - fromGroup: jupiter-webapi-config
    - fromGroup: jupiter-webapi-secrets
    - key: SQLITE_DB_URL
      value: sqlite+aiosqlite:////data/jupiter.sqlite
    - key: POSTGRES_DB_URL
      fromDatabase:
        name: jupiter-webapi-db
        property: connectionString
# Schedules match ``get_background_mutation_crontab()`` on each use case (see ``background_mutation_use_case``).
- type: cron
  name: jupiter-webapi-gc-do-all
  <<: *webapi-build-filter
  runtime: docker
  dockerfilePath: ./src/webapi/gc-do-all/Dockerfile
  dockerContext: .
  region: frankfurt
  plan: starter
  schedule: "0 * * * *"
  autoDeploy: true
  rootDir: .
  envVars:
    - fromGroup: jupiter-webapi-config
    - fromGroup: jupiter-webapi-secrets
    - key: WEBAPI_CRON_EXECUTION_MODE
      value: start-run-stop
    - key: POSTGRES_DB_URL
      fromDatabase:
        name: jupiter-webapi-db
        property: connectionString
- type: cron
  name: jupiter-webapi-clear-abandoned-users-do-all
  <<: *webapi-build-filter
  runtime: docker
  dockerfilePath: ./src/webapi/clear-abandoned-users-do-all/Dockerfile
