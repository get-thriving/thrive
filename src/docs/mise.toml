["package:src:docs:prepare"]
hide = true
run = "true"

["package:src:docs:install"]
hide = true
sources = ["src/docs/pyproject.toml"]
outputs = { auto = true }
run = "cd src/docs && poetry install --no-interaction --no-ansi"

["package:src:docs:libyear:libyear-toml"]
hide = true
run = "libyear toml src/docs/pyproject.toml"

["package:src:docs:libyear"]
description = "Check src/docs libyear"
depends = ["package:src:docs:libyear:*"]
run = "true"

["package:src:docs:lint:toml"]
hide = true
sources = ["src/docs/mise.toml"]
outputs = { auto = true }
run = "npx eslint src/docs/mise.toml"

["package:src:docs:lint:yamllint"]
hide = true
sources = ["src/docs/**/*.{yml|yaml}"]
outputs = { auto = true }
run = "poetry run yamllint --config-file=./scripts/check/lint/yamllint src/docs/mkdocs.yml"

["package:src:docs:lint:mdl-docs"]
hide = true
sources = ["src/docs/**/*.md"]
outputs = { auto = true }
run = '''
#!/usr/bin/env bash
set -ex
mdl --config="./scripts/check/lint/mdl-docs" src/docs/
'''

["package:src:docs:lint"]
description = "Check src/docs module"
depends = ["package:src:docs:lint:*"]
run = "true"
