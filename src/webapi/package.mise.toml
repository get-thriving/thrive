["package:src:webapi:prepare"]
hide = true
run = "true"

["package:src:webapi:install"]
hide = true
sources = ["src/webapi/pyproject.toml"]
outputs = { auto = true }
run = "cd src/webapi && uv sync --active"
wait_for = ["package:src:core:install"]

["package:src:webapi:fix:markdownlint"]
hide = true
sources = ["src/webapi/README.md"]
outputs = { auto = true }
run = "npx markdownlint-cli2 --fix src/webapi/README.md"

["package:src:webapi:fix:autoflake"]
hide = true
sources = ["src/webapi/**/*.py"]
outputs = { auto = true }
run = "uvx autoflake --config=tasks/_resources/check/lint/autoflake src/webapi"

["package:src:webapi:fix:black"]
hide = true
sources = ["src/webapi/**/*.py"]
outputs = { auto = true }
run = "uvx black src/webapi"

["package:src:webapi:fix:ruff"]
hide = true
sources = ["src/webapi/**/*.py"]
outputs = { auto = true }
run = "uvx ruff check --cache-dir=.build-cache/ruff --config=./tasks/_resources/check/lint/ruff.toml src/webapi --fix"

["package:src:webapi:fix"]
description = "Fix src/webapi module"
depends = ["package:src:webapi:fix:*"]
run = "true"

["package:src:webapi:lint:toml"]
hide = true
sources = ["src/webapi/package.mise.toml"]
outputs = { auto = true }
run = "npx eslint src/webapi/package.mise.toml"

["package:src:webapi:lint:hadolint"]
hide = true
sources = ["src/webapi/Dockerfile"]
outputs = { auto = true }
run = '''
#!/usr/bin/env bash
set -e -o pipefail
docker run --rm -i \
  -v "$(pwd)/tasks/_resources/check/lint/hadolint":/hadolint \
  -v "$(pwd)/src/webapi/Dockerfile:/Dockerfile" \
  hadolint/hadolint:latest-debian \
  hadolint \
  --config=/hadolint \
  /Dockerfile
'''

["package:src:webapi:lint:mypy"]
env.MYPYPATH = "../core"
hide = true
sources = ["src/webapi/**/*.py"]
outputs = { auto = true }
run = "cd src/webapi && uvx mypy --config=../../tasks/_resources/check/lint/mypy --package jupiter.webapi --package tests --explicit-package-bases --show-absolute-path"

["package:src:webapi:lint:ruff"]
env.MYPYPATH = "../core"
hide = true
sources = ["src/webapi/**/*.py"]
outputs = { auto = true }
run = "uvx ruff check --cache-dir=.build-cache/ruff --config=./tasks/_resources/check/lint/ruff.toml src/webapi"

["package:src:webapi:lint:markdownlint-readme"]
hide = true
sources = ["src/webapi/README.md"]
outputs = { auto = true }
run = "npx markdownlint-cli2 src/webapi/README.md"

["package:src:webapi:lint:pyflakes"]
hide = true
sources = ["src/webapi/**/*.py"]
outputs = { auto = true }
run = "uvx pyflakes src/webapi"

["package:src:webapi:lint:bandit"]
hide = true
sources = ["src/webapi/**/*.py"]
outputs = { auto = true }
run = "uvx bandit --configfile=./tasks/_resources/check/lint/bandit --ini=./tasks/_resources/check/lint/bandit.src.ini -r src/webapi"

["package:src:webapi:lint:pydocstyle"]
hide = true
sources = ["src/webapi/**/*.py"]
outputs = { auto = true }
run = "uvx pydocstyle --config=./tasks/_resources/check/lint/pydocstyle src/webapi"

["package:src:webapi:lint"]
description = "Check src/webapi module"
depends = ["package:src:webapi:lint:*"]
run = "true"

["package:src:webapi:audit:pip-audit"]
hide = true
run = '''
#!/usr/bin/env bash
set -e -o pipefail
cd src/webapi
uvx pip-audit --disable-pip -r <(uv export --format requirements.txt --all-groups)
'''

["package:src:webapi:audit"]
description = "Audit src/webapi module"
depends = ["package:src:webapi:audit:*"]
run = "true"

["package:src:webapi:libyear:libyear-toml"]
hide = true
run = "libyear toml src/webapi/pyproject.toml"

["package:src:webapi:libyear"]
description = "Check src/webapi libyear"
depends = ["package:src:webapi:libyear:*"]
run = "true"
